<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<script>
// Simple password protection
const password = prompt("Enter Admin Password:");
if(password !== "admin123"){
    alert("Access Denied");
    window.location.href = "index.html";
}
</script>

<header class="header">
<h1>HV Hospitals - Admin Panel</h1>
<nav>
<a href="index.html">Home</a>
</nav>
</header>

<section style="padding:50px; text-align:center;">

<h2>Patient Appointments</h2>

<input type="text" id="search" placeholder="Search by name">
<button onclick="searchAppointments()">Search</button>

<br><br>

<table id="appointmentsTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Department</th>
<th>Symptoms</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</section>

<script>
let allAppointments = [];

// LOAD all appointments from MySQL backend
async function loadAppointments() {
    try {
        const response = await fetch("/appointments");
        allAppointments = await response.json();
        displayAppointments(allAppointments);
    } catch (err) {
        console.error("Error loading appointments:", err);
        alert("Failed to load appointments from server.");
    }
}

// DISPLAY appointments in table
function displayAppointments(data) {
    const table = document.querySelector("#appointmentsTable tbody");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `
        <tr>
        <td colspan="7" style="padding:20px; text-align:center; color:gray;">
        No Appointments Found
        </td>
        </tr>
        `;
        return;
    }

    data.forEach(app => {
        const row = document.createElement("tr");
        row.innerHTML = `
        <td>${app.id}</td>
        <td>${app.name}</td>
        <td>${app.email}</td>
        <td>${app.phone}</td>
        <td>${app.department}</td>
        <td>${app.symptoms}</td>
        <td><button onclick="deleteAppointment(${app.id})">Delete</button></td>
        `;
        table.appendChild(row);
    });
}

// SEARCH appointments by name
function searchAppointments() {
    const keyword = document.getElementById("search").value.toLowerCase();
    const filtered = allAppointments.filter(a => 
        a.name.toLowerCase().includes(keyword)
    );
    displayAppointments(filtered);
}

// DELETE appointment by MySQL ID
async function deleteAppointment(id) {
    if (!confirm("Are you sure you want to delete this appointment?")) return;
    try {
        const response = await fetch("/appointments/" + id, { method: "DELETE" });
        const data = await response.json();
        if (response.ok) {
            alert(data.message || "Deleted successfully");
            loadAppointments();
        } else {
            alert(data.message || "Failed to delete appointment");
        }
    } catch (err) {
        console.error("Delete error:", err);
        alert("Server error. Could not delete appointment.");
    }
}

// Initial load
loadAppointments();
</script>

</body>
</html>
