<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>HV Hospitals</h1>
</header>

<section style="padding:60px;text-align:center;">

<h2>Book Appointment</h2>

<form id="appointmentForm">

<input type="text" id="name" placeholder="Patient Name" required><br><br>

<input type="email" id="email" placeholder="Email" required><br><br>

<input type="text" id="phone" placeholder="Phone" required><br><br>

<select id="department">
<option>Cardiology</option>
<option>Neurology</option>
<option>Orthopedic</option>
</select><br><br>

<textarea id="symptoms" placeholder="Symptoms"></textarea><br><br>

<button type="submit">Confirm Appointment</button>

</form>

</section>

<script>
document.getElementById("appointmentForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
department: document.getElementById("department").value,
symptoms: document.getElementById("symptoms").value
};

await fetch("https://your-render-url.onrender.com/appointment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Appointment Booked Successfully");
this.reset();

});
</script>

</body>
</html>
