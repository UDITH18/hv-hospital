<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment | HV Hospitals</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>HV Hospitals</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="book.html">Book Appointment</a>
    </nav>
</header>

<section id="appointment" class="form-wrapper">
    <form id="appointmentForm">
        <h2>Book Your Appointment</h2>
        <input id="name" type="text" placeholder="Your Name" required>
        <input id="email" type="email" placeholder="Email" required>
        <input id="phone" type="text" placeholder="Phone" required>
        <select id="department" required>
            <option value="">Select Department</option>
            <option value="Cardiology">Cardiology</option>
            <option value="Neurology">Neurology</option>
            <option value="Orthopedics">Orthopedics</option>
        </select>
        <textarea id="symptoms" placeholder="Describe your symptoms"></textarea>
        <button type="submit">Book Appointment</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
